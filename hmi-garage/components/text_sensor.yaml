  - platform: homeassistant
    id: id_media_state
    entity_id: ${media_player_garage_entity_id}
    internal: true
    on_value:
      - if:
          condition:
            # Checks if "my_text_sensor" has state "Hello World"
            text_sensor.state:
              id: id_media_state
              state: 'playing'
          then:
            - lvgl.label.update:
                id: id_lv_lab_music_playpause_icon
                text: ${pause_icon}
          else:
            - lvgl.label.update:
                id: id_lv_lab_music_playpause_icon
                text: ${play_icon}
  - platform: homeassistant
    id: id_media_now_playing_ico
    entity_id: ${media_player_garage_entity_id}
    attribute: entity_picture
    filters:
      - prepend: ${ha_instance_url}
    internal: true

# TODO online_image re-enable once PNG decoder error is fixed
    on_value:
      then:
        - online_image.set_url:
            id: id_online_img_now_playing
            url: !lambda "return x.c_str();"
        - if:
            condition:
              lvgl.page.is_showing: page_music
            then:
              - component.update: id_online_img_now_playing

  - platform: homeassistant
    id: id_media_now_playing_track
    entity_id: ${media_player_garage_entity_id}
    attribute: media_title
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: id_lv_lab_now_playing_track_name
            text: !lambda "return x.c_str();"
  - platform: homeassistant
    id: id_media_now_playing_album
    entity_id: ${media_player_garage_entity_id}
    attribute: media_album_name
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: id_lv_lab_now_playing_album_name
            text: !lambda "return x.c_str();"
  - platform: homeassistant
    id: id_media_now_playing_artist
    entity_id: ${media_player_garage_entity_id}
    attribute: media_artist
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: id_lv_lab_now_playing_artist_name
            text: !lambda "return x.c_str();"
  - platform: homeassistant
    id: id_media_player_repeat
    entity_id: ${media_player_garage_entity_id}
    attribute: repeat
    internal: true
    on_value:
      then:
        - if:
            condition:
              text_sensor.state:
                id: id_media_player_repeat
                state: 'all'
            then:
              - lvgl.label.update:
                  id: id_label_media_player_repeat
                  text: ${repeat_icon}
                  text_color: color_dark_blue
            else:
              - if:
                  condition:
                    text_sensor.state:
                      id: id_media_player_repeat
                      state: 'one'
                  then:
                    - lvgl.label.update:
                        id: id_label_media_player_repeat
                        text: ${repeat_once_icon}
                        text_color: color_dark_blue
                  else:
                    - lvgl.label.update:
                        id: id_label_media_player_repeat
                        text: ${repeat_off_icon}
                        text_color: color_gray
  - platform: homeassistant
    id: id_media_player_shuffle
    entity_id: ${media_player_garage_entity_id}
    attribute: shuffle
    internal: true
    on_value:
      then:
        - if:
            condition:
              text_sensor.state:
                id: id_media_player_shuffle
                state: 'on'
            then:
              - lvgl.label.update:
                  id: id_label_media_player_shuffle
                  text: ${shuffle_icon}
                  text_color: color_dark_blue
            else:
              - lvgl.label.update:
                  id: id_label_media_player_shuffle
                  text: ${shuffle_disabled_icon}
                  text_color: color_gray

  - platform: homeassistant
    id: id_text_gr_freeze_end_time
    entity_id: ${garage_light_automation_freeze_timer_end_time}
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: id_lv_lab_gr_freeze_time_end
            text: !lambda |-
              return ("Réactivation à " + id(id_text_gr_freeze_end_time).state).c_str();
  - platform: homeassistant
    id: id_text_gr_freeze_start_time
    entity_id: ${garage_light_automation_freeze_timer_value_on_start}
    internal: true
    filters:
      - lambda: >
          size_t idx = 0;
          for(size_t i = 0; i <= x.length(); i++)
          {
            if(x.c_str()[i] == ':')  
            {
                idx = i;
            }
          }
          if(idx < x.length())
          {
            return str_truncate(x, idx);
          }

          return x;
    on_value:
      then:
        - lvgl.label.update:
            id: id_lv_lab_gr_freeze_init_time
            text: !lambda |-
                return ("Désactiver durant " + id(id_text_gr_freeze_start_time).state).c_str();
  - platform: homeassistant
    id: id_text_gs_freeze_end_time
    entity_id: ${garage_ss_light_automation_freeze_timer_end_time}
    internal: true
    on_value:
      then:
        - lvgl.label.update:
            id: id_lv_lab_gs_freeze_end_time
            text: !lambda |-
              return ("Réactivation à " + id(id_text_gs_freeze_end_time).state).c_str();
  - platform: homeassistant
    id: id_text_gs_freeze_start_time
    entity_id: ${garage_ss_light_automation_freeze_timer_value_on_start}
    internal: true
    filters:
      - lambda: >
          size_t idx = 0;
          for(size_t i = 0; i <= x.length(); i++)
          {
            if(x.c_str()[i] == ':')  
            {
                idx = i;
            }
          }
          if(idx < x.length())
          {
            return str_truncate(x, idx);
          }

          return x;
    on_value:
      then:
        - lvgl.label.update:
            id: id_lv_lab_gs_freeze_init_time
            text: !lambda |-
                return ("Désactiver durant " + id(id_text_gs_freeze_start_time).state).c_str();
