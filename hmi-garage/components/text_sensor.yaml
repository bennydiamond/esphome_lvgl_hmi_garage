  # Light Lampadaire Avant Color mode
  - platform: homeassistant
    id: id_lamp_color_mode
    entity_id: ${lampadaire_avant_lights_ha_entity_id}
    internal: true
    attribute: color_mode
    on_value:
      - delay: 20ms
      - if:
          condition:
            text_sensor.state:
              id: id_lamp_color_mode
              state: "color_temp"
          then:
            - lvgl.widget.update:
                id: id_lv_obj_lamp_color_kelvin
                hidden: False
            - lvgl.widget.update:
                id: id_lv_obj_lamp_color_rgb
                hidden: True
            - lvgl.button.update:
                id: id_lv_but_lamp_ctemp
                border_opa: COVER
            - lvgl.button.update:
                id: id_lv_but_lamp_crgb
                border_opa: TRANSP
          else:
            - lvgl.slider.update:
                id: id_lv_slid_lamp_kelvin
                value: 0.0
            - lvgl.widget.update:
                id: id_lv_obj_lamp_color_kelvin
                hidden: True
            - lvgl.button.update:
                id: id_lv_but_lamp_ctemp
                border_opa: TRANSP
            - if:
                condition:
                  text_sensor.state:
                    id: id_lamp_color_mode
                    state: "hs"
                then: 
                  - lvgl.widget.update:
                      id: id_lv_obj_lamp_color_rgb
                      hidden: False
                  - lvgl.button.update:
                      id: id_lv_but_lamp_crgb
                      border_opa: COVER
                else:
                  - lvgl.widget.update:
                      id: id_lv_obj_lamp_color_rgb
                      hidden: True
                  - lvgl.button.update:
                      id: id_lv_but_lamp_crgb
                      border_opa: TRANSP
