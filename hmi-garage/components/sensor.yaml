  # Media player volume value
  - platform: homeassistant
    id: id_media_volume
    entity_id: ${media_player_garage_entity_id}
    internal: true
    attribute: volume_level
    on_value:
      - lvgl.slider.update:
          id: id_lv_slid_media_volume
          value: !lambda "return x * 100.0;"