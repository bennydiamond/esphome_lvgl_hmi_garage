                    format: "%.0f %%"
                    args: [id(id_lamp_bright).state / 2.55]
            - lvgl.arc.update:
                id: id_lv_arc_lamp
                value: !lambda return x;
            - lvgl.button.update: 
                id: id_lv_but_page_lamp
                shadow_spread: !lambda |-
                  uint8_t result = 2;
                  result += (uint8_t)(id(id_lamp_bright).state / 255 * 20); // Swing from 3 to 21
                  return result;
                shadow_width: !lambda |-
                  uint8_t result = 20;
                  result += (uint8_t)(id(id_lamp_bright).state / 2.55); // Swing from 21 to 120
                  return result;

   # Light Extérieur Coté Kelvin
  - platform: homeassistant
    id: id_extc_kelvin
    entity_id: ${exterieur_cote_lights_ha_entity_id}
    internal: true
    attribute: color_temp_kelvin
    on_value:
      - globals.set:
          id: id_global_extc_kelvin
          value: !lambda |-
            if(std::isnan(x))
              return id(id_global_extc_kelvin);
            return static_cast<int>(x);
      - lvgl.slider.update:
          id: id_lv_slid_extc_kelvin
          value: !lambda return -x + (${exterieur_cote_min_kelvin} + ${exterieur_cote_max_kelvin});
      - lvgl.label.update:
          id: id_lv_lab_extc_kelvin
          text:
              format: "%.0f K"
              args: [id(id_extc_kelvin).state]

