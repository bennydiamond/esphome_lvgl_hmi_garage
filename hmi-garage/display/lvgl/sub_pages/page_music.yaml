id: page_music
bg_color: color_black
# TODO online_image re-enable once PNG decoder error is fixed
#on_load:
#  then:
#    - component.update: id_online_img_now_playing
widgets:
  - obj:
      id: id_lvgl_music_player
      x: 10
      y: 46
      height: 370
      width: 700
      align: TOP_LEFT
      bg_opa: TRANSP
      shadow_opa: TRANSP
      scrollable: False
      widgets:
        - image:
            src: music_note #id_online_img_now_playing
            id: id_lvgl_image_now_playing
            bg_opa: TRANSP
            align: TOP_LEFT
            x: 0
            y: 0
            height: 200
            width: 200
            radius: 11
            clip_corner: true
        - label:
            id: id_lv_lab_now_playing_track_name
            bg_opa: TRANSP
            align: TOP_LEFT
            x: 214
            y: 10
            height: 30
            width: 440
            long_mode: SCROLL
            text_font: lato_24
            text_color: color_white
            text_align: LEFT
            text: ""
        - label:
            id: id_lv_lab_now_playing_album_name
            bg_opa: TRANSP
            align: TOP_LEFT
            x: 214
            y: 60
            height: 24
            width: 440
            long_mode: SCROLL
            text_font: lato_18
            text_color: color_white
            text_align: LEFT
            text: ""
        - label:
            id: id_lv_lab_now_playing_artist_name
            bg_opa: TRANSP
            align: TOP_LEFT
            x: 214
            y: 90
            height: 24
            width: 440
            long_mode: SCROLL
            text_font: lato_18
            text_color: color_white
            text_align: LEFT
            text: ""
        - button:
            x: 0
            y: 190
            height: 100
            width: 100
            bg_opa: TRANSP
            shadow_opa: TRANSP
            align: TOP_LEFT
            widgets:
                - label:
                    x: -10
                    text_font: mdi_icons_72
                    text_color: color_white
                    text: ${skip_previous_icon}
            on_press:
                then:
                - homeassistant.action:
                    action: media_player.media_previous_track
                    data:
                      entity_id: ${media_player_garage_entity_id}
        - button:
            x: 100
            y: 190
            height: 100
            width: 100
            bg_opa: TRANSP
            shadow_opa: TRANSP
            align: TOP_LEFT
            widgets:
                - label:
                    text_font: mdi_icons_72
                    text_color: color_white
                    text: ${skip_next_icon}
            on_press:
                then:
                - homeassistant.action:
                    action: media_player.media_next_track
                    data:
                      entity_id: ${media_player_garage_entity_id}
        - button:
            x: 26
            y: 290
            height: 55
            width: 54
            bg_opa: TRANSP
            shadow_opa: TRANSP
            align: TOP_LEFT
            widgets:
                - label:
                    align: CENTER
                    y: -10
                    id: id_label_media_player_repeat
                    text_font: mdi_icons_32
                    text_color: color_gray
                    text: ${repeat_off_icon}
            on_press:
                then:
                - homeassistant.action:
                    action: media_player.repeat_set
                    data:
                      entity_id: ${media_player_garage_entity_id}
                      repeat: !lambda |-
                        if(id(id_media_player_repeat).state == "all")
                            return "off";
                        else if(id(id_media_player_repeat).state == "one")
                            return "all";
                        else
                            return "one";
        - button:
            x: 126
            y: 290
            height: 55
            width: 54
            bg_opa: TRANSP
            shadow_opa: TRANSP
            align: TOP_LEFT
            widgets:
                - label:
                    align: CENTER
                    y: -10
                    id: id_label_media_player_shuffle
                    text_font: mdi_icons_32
                    text_color: color_gray
                    text: ${shuffle_disabled_icon}
            on_press:
                then:
                - homeassistant.action:
                    action: media_player.shuffle_set
                    data:
                      entity_id: ${media_player_garage_entity_id}
                      shuffle: !lambda |-
                        if(id(id_media_player_shuffle).state == "on")
                            return "false";
                        else
                            return "true";
  - button:
      x: 0
      y: 0
      width: 80
      height: 50
      bg_opa: TRANSP
      shadow_opa: TRANSP
      radius: 0
      align: BOTTOM_LEFT
      widgets:
        - label:
            x: 5
            y: -5
            pad_all: 0
            text_font: montserrat_22
            text_color: color_dark_gray
            text: "\uF015"
      on_press:
        then:
          - lvgl.page.show: 
              id: page_home
              animation: OUT_RIGHT
              time: 300ms
