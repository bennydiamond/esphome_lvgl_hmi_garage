id: page_home
skip: True
bg_color: color_black
widgets:
  - <<: !include datetime_widget.yaml
  - <<: !include weather_widget.yaml
  - <<: !include garage_rdc_widget.yaml
  - <<: !include garage_ss_widget.yaml
  - <<: !include button_grid.yaml
  - obj:
            id: id_widget_but_all
            bg_opa: TRANSP
            border_opa: TRANSP
            shadow_opa: TRANSP
            pad_all: 0
            align: TOP_MID
            x: -50
            y: 44
            width: 150
            height: 140
            hidden: False
            widgets:
              - label:
                  align: TOP_MID
                  text_font: lato_24
                  text_color: color_white
                  text: "Tout éteindre"
              - button:
                  #id: ${id_lvgl_widget_button}
                  width: 90
                  height: 90
                  y: 10
                  align: CENTER
                  bg_opa: TRANSP
                  shadow_opa: 100%
                  shadow_color: color_bright_white
                  shadow_spread: 4
                  shadow_width: 30
                  border_width: 2
                  radius: 50
                  on_press:
                    - homeassistant.action:
                        action: light.turn_off
                        data:
                          entity_id: light.toutes_les_lumieres_sauf_eclairage_exterieur
                  widgets:
                    - label:
                        align: CENTER
                        text_font: mdi_icons_72
                        text_color: color_bright_white
                        text: "${lights}"


  - button:
      x: 0
      y: 0
      width: 80
      height: 50
      bg_opa: TRANSP
      shadow_opa: TRANSP
      radius: 0
      align: BOTTOM_LEFT
      widgets:
        - label:
            x: 1
            y: -7
            pad_all: 0
            text_font: mdi_icons_32
            text_color: color_dark_gray
            text: ${settings}
      on_press:
        then:
          - lvgl.page.show: 
              id: page_settings
              animation: OUT_RIGHT
              time: 300ms