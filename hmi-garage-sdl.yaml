# Based of https://github.com/alaltitov/display/tree/main

# ESP32-S3-Touch-LCD-7
substitutions: !include hmi-garage/substitutions.yaml

packages:
  hardware: !include hmi-garage/sdl.yaml
  button: !include hmi-garage/components/button.yaml
  globals: !include hmi-garage/components/globals.yaml
  interval: !include hmi-garage/components/interval.yaml
  text_sensor: !include hmi-garage/components/text_sensor.yaml
  sensor: !include hmi-garage/components/sensor.yaml
  binary_sensor: !include hmi-garage/components/binary_sensor.yaml
  switch: !include hmi-garage/components/switch.yaml
  online_image: !include hmi-garage/components/online_image.yaml
  select: !include hmi-garage/components/select.yaml


  # LVGL
  page_home: !include hmi-garage/display/lvgl/page_home/page_home.yaml
  page_settings: !include hmi-garage/display/lvgl/sub_pages/page_settings.yaml
  page_music: !include hmi-garage/display/lvgl/sub_pages/page_music.yaml
  page_light_garage_rdc: !include hmi-garage/display/lvgl/sub_pages/page_light_garage_rdc.yaml
  page_light_garage_ss: !include hmi-garage/display/lvgl/sub_pages/page_light_garage_ss.yaml
  page_light_lampadaire_avant: !include
    file: hmi-garage/display/lvgl/templates/template.page_light_rgbct.yaml
    vars:
      light_friendly_name: "Lampadaire Avant"
      light_ha_entity: ${lampadaire_avant_lights_ha_entity_id}
      lvgl_page_id: page_lamp
      light_button_grid_button_id: id_lv_but_lamp
      light_button_grid_label_id: id_lv_lab_lamp
      light_ha_min_kelvin: ${lampadaire_avant_min_kelvin}
      light_ha_max_kelvin: ${lampadaire_avant_max_kelvin}
  page_light_exterieur_garage: !include 
    file: hmi-garage/display/lvgl/templates/template.page_light_rgbct.yaml
    vars:
      light_friendly_name: "Corniche Garage"
      light_ha_entity: ${exterieur_garage_lights_ha_entity_id}
      lvgl_page_id: page_light_exterieur_garage
      light_button_grid_button_id: id_lv_but_extg
      light_button_grid_label_id: id_lv_lab_extg
      light_ha_min_kelvin: ${exterieur_garage_min_kelvin}
      light_ha_max_kelvin: ${exterieur_garage_max_kelvin}
  page_light_exterieur_cote: !include
    file: hmi-garage/display/lvgl/templates/template.page_light_rgbct.yaml
    vars:
      light_friendly_name: "Corniche Coté"
      light_ha_entity: ${exterieur_cote_lights_ha_entity_id}
      lvgl_page_id: page_light_exterieur_cote
      light_button_grid_button_id: id_lv_but_extc
      light_button_grid_label_id: id_lv_lab_extc
      light_ha_min_kelvin: ${exterieur_cote_min_kelvin}
      light_ha_max_kelvin: ${exterieur_cote_max_kelvin}

api:

http_request:

external_components:
  - source: github://pr#8040
    refresh: 30s
    components: [http_request]


# Backlight
# Not needed for unit in the garage
#output:
#  - platform: ledc
#    pin: GPIO16
#    id: backlight

#light:
#  - platform: monochromatic
#    output: backlight
#    name: ${uname} backlight
#    restore_mode: ALWAYS_ON

font: !include hmi-garage/display/fonts.yaml
image: !include hmi-garage/display/images.yaml
color: !include hmi-garage/display/colors.yaml

lvgl:
  gradients: !include hmi-garage/display/gradients.yaml
  disp_bg_image: none

  top_layer: # Top Screen Status bar. Visible on all pages, except Boot Screen
    widgets:
      - <<: !include hmi-garage/display/lvgl/top_layer/media_control_side_widget.yaml
      # Top notification area delimiter line
      - <<: !include hmi-garage/display/lvgl/top_layer/notification_area.yaml


button:
  - platform: restart
    name: "Device Restart (fake safe mode)"
    id: id_button_device_restart_safe_mode
    internal: True